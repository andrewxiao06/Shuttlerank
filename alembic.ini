[alembic]
# Migration directory — lives inside the package so it ships with the code.
script_location = badminton_rating/db/migrations

# Use a directory layout split by year (overkill for now, but free).
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# DATABASE_URL is sourced from the environment by env.py — leave empty here
# so this file is safe to commit and identical across environments.
sqlalchemy.url =

# Use absolute paths from project root.
prepend_sys_path = .

# Treat datetime stamps in revision filenames as UTC.
timezone = UTC

# Don't truncate slug.
truncate_slug_length = 60

# Use a single transaction per migration — DDL is rolled back on failure
# on Postgres.
transaction_per_migration = true


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
